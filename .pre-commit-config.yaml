# Pre-commit hook configuration for TeslaUSB B-1.
#
# All Rust / Python / hygiene gates funnel through scripts/check.sh
# so the charter (docs/03-CODE-QUALITY-CHARTER.md "CI Gates") has a
# single source of truth. Upstream pre-commit-hooks are kept ONLY
# for cheap whitespace / EOF / yaml / TOML fixes that have no
# equivalent in scripts/check.sh.
#
# Install with:
#     pip install pre-commit            # or: pip install -e web/[dev]
#     pre-commit install                # registers .git/hooks/pre-commit
#
# Run manually against every tracked file:
#     pre-commit run --all-files
#
# Same gates also run via:
#     ./scripts/check.sh --all
# (which is what these hooks ultimately call for the heavy work).

repos:
  # Cheap formatting / safety fixes that have no equivalent in scripts/check.sh.
  # One-time clone; cached under ~/.cache/pre-commit thereafter.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'  # markdown trailing spaces are intentional line breaks
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]  # 1 MiB cap per charter "CI Gates" hygiene rule
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Heavy gates: delegate to scripts/check.sh so the gate definitions
  # are NOT duplicated between YAML and the script.
  - repo: local
    hooks:
      - id: scripts-check-hygiene
        name: scripts/check.sh --hygiene
        entry: ./scripts/check.sh --hygiene
        language: system
        pass_filenames: false
        always_run: true

      - id: scripts-check-rust
        name: scripts/check.sh --rust
        entry: ./scripts/check.sh --rust
        language: system
        pass_filenames: false
        files: '\.rs$|^rust/.*Cargo\.(toml|lock)$|^rust/rust-toolchain\.toml$'

      - id: scripts-check-python
        name: scripts/check.sh --python
        entry: ./scripts/check.sh --python
        language: system
        pass_filenames: false
        files: '\.py$|^web/pyproject\.toml$'
