# Pre-commit hooks for the TeslaUSB B-1 (Rust) tree.
# Install once:  pip install pre-commit && pre-commit install
# Run on all files:  pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]

  # Local Rust gates (mirror SPEC.md §7 / CI). Scoped to rust/ via manifest-path
  # so they work regardless of the commit's working directory.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --manifest-path rust/Cargo.toml --all --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy -D warnings
        entry: cargo clippy --manifest-path rust/Cargo.toml --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
