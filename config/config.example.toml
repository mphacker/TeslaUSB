# TeslaUSB B-1 — example configuration (config.example.toml)
#
# WHAT THIS IS
#   The installer stages this file to /etc/teslausb/config.example.toml and, on a
#   first install only, seeds /etc/teslausb/config.toml from it (existing
#   config.toml is always preserved on update). It is part of the release artifact
#   (release/build-release.sh --config-file) and is covered by the SHA256SUMS
#   manifest.
#
# WHAT CONFIGURES THE DAEMONS TODAY
#   Per-daemon runtime configuration currently lives in each service's systemd
#   unit as Environment= lines (deploy/systemd/*.service) — e.g. webd's
#   WEBD_DB / WEBD_BIND / WEBD_STATIC / WEBD_ARCHIVE_ROOT / WEBD_CACHE_DIR,
#   indexd's INDEXD_DB / INDEXD_IMAGE, wifid's credential path. No daemon reads
#   this TOML yet. This file is the FORWARD-COMPATIBLE SEAM for a future unified
#   configuration: keys will be added here (and consumed by the daemons) only as
#   that wiring lands, so the example never advertises settings nothing honors.
#
# SCHEMA
#   `schema` is the config-schema version (matches the release manifest's
#   CONFIG_SCHEMA_VERSION). It exists so a future loader can migrate older
#   on-device config.toml files forward. Do not remove it.

[teslausb]
schema = 1
