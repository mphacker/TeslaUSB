# TeslaUSB B-1 web app — nginx site configuration.
#
# Install path (matches Phase 6 setup.sh):
#   /etc/nginx/sites-available/teslausb
# Symlinked from:
#   /etc/nginx/sites-enabled/teslausb
#
# Charter §"Architectural Principles" / Decisions #24, #29:
#   - nginx binds privileged port 80 (drops to www-data after).
#   - gunicorn runs as the teslausb user on a Unix socket; nginx is
#     the only upstream.
#   - Flask never runs as root, never on a public port.
#
# Captive portal contract: every Tesla / iOS / Android probe URL
# returns 302 to the WiFi setup page so the vehicle's browser
# auto-opens the AP-mode UI. The regex covers the documented probe
# endpoints; the catch-all `location /` falls through to the Flask
# app (which serves the captive-portal blueprint when AP mode is
# active and the dashboard otherwise — that branching is the app's
# job, not nginx's).

# --- Upstream -----------------------------------------------------------

upstream teslausb_web {
    # The socket path matches config/gunicorn.conf.py's `bind` and
    # the teslausb-web.service `RuntimeDirectory=teslausb-web`.
    # (Distinct from teslafat's /run/teslausb — see 04-units.sh
    # for the runtime-dir collision lesson.)
    server unix:/run/teslausb-web/gunicorn.sock fail_timeout=0;
    keepalive 32;
}


# --- Server -------------------------------------------------------------

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Match the gunicorn / Flask cap exactly. nginx returns 413 here
    # before the body ever reaches gunicorn, so an oversized upload
    # cannot exhaust the Pi's RAM.
    client_max_body_size 512m;
    client_body_buffer_size 256k;
    client_body_timeout 120s;

    # Buffering off for proxied streaming responses (status polling,
    # SSE if added later). It's safe at this concurrency level.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 5s;

    # Trust the X-Forwarded-* headers we set ourselves; never forward
    # ones we received from the client.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # --- Captive-portal probe redirects --------------------------------
    #
    # Each manufacturer's network-stack uses a known URL to test for
    # captive portals. Returning 302 to /portal makes the device's
    # built-in browser pop the WiFi setup page automatically.
    #
    # Apple:    /hotspot-detect.html, /library/test/success.html
    # Android:  /generate_204, /gen_204
    # Microsoft: /connecttest.txt, /ncsi.txt, /redirect
    # Tesla nav uses Android's gen_204.
    #
    # The trailing `$1` preserves the query string when present, so
    # any probe carrying a token survives the redirect intact.
    location = /hotspot-detect.html       { return 302 /portal$is_args$args; }
    location = /library/test/success.html { return 302 /portal$is_args$args; }
    location = /generate_204              { return 302 /portal$is_args$args; }
    location = /gen_204                   { return 302 /portal$is_args$args; }
    location = /connecttest.txt           { return 302 /portal$is_args$args; }
    location = /ncsi.txt                  { return 302 /portal$is_args$args; }
    location = /redirect                  { return 302 /portal$is_args$args; }

    # --- Static assets -------------------------------------------------
    #
    # nginx serves the static dir directly so gunicorn never touches
    # /static requests. The setup.sh script lays the dir down at the
    # path below; the alias trailing slash + `try_files $uri =404`
    # combination prevents path traversal (nginx CVE-2009-2629 class).
    location /static/ {
        alias /opt/teslausb/web/teslausb_web/static/;
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
        access_log off;
    }

    # --- Protected video serve (X-Accel-Redirect) ----------------------
    #
    # Internal-only location used by the Flask /videos/stream,
    # /videos/sei, /videos/download routes. Flask validates the path
    # against its allow-list, then returns an X-Accel-Redirect
    # header pointing here; nginx serves the file directly with
    # native HTTP Range support and zero-copy sendfile. This frees
    # the single sync gunicorn worker immediately — without it the
    # browser's parallel Range requests (one for the MP4 start, one
    # for the moov atom at end-of-file in Tesla's MP4 layout)
    # serialize behind the lone worker and the <video> element
    # hangs on a loading spinner.
    #
    # `internal` blocks external access — the prefix is only
    # reachable via a Flask-issued X-Accel-Redirect. The alias path
    # must match `paths.backing_root + "/TeslaCam"` from
    # /etc/teslausb/teslausb-web.toml; setup.sh keeps them in sync.
    location /_protected_teslacam/ {
        internal;
        alias /srv/teslausb/teslacam/TeslaCam/;
        # Re-enable buffering and sendfile for the file serve —
        # the server-block defaults turn buffering off for streaming
        # API responses, but that's wrong for static video files.
        proxy_buffering on;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        # nginx generates Content-Type from extension; ensure .mp4
        # gets video/mp4 regardless of system mime.types quirks.
        types { } default_type video/mp4;
        # Long cache for content-addressed clip names (Tesla's
        # timestamped filenames are effectively immutable).
        expires 1h;
        add_header Cache-Control "private, max-age=3600";
        access_log off;
    }

    # --- Flask app -----------------------------------------------------

    location / {
        proxy_pass http://teslausb_web;
    }
}
