# /etc/NetworkManager/conf.d/10-teslausb-no-powersave.conf
#
# Installed by setup-lib/12-wifi-stability.sh.
#
# Disables WiFi power-save on every NM-managed wlan profile. On the
# Pi Zero 2 W's BCM43436 SDIO WiFi chip, power-save + sustained TX
# load (rclone uploads, big SMB writes) reproduces a brcmfmac
# firmware lockup that manifests as repeated:
#
#   brcmfmac: brcmf_proto_bcdc_query_dcmd ... err=-110
#   brcmfmac: brcmf_sdio_hostmail HT Avail request error: -5
#
# Once the chip wedges, the kernel keeps running but WiFi never
# recovers — only a brcmfmac module reload or a reboot brings it
# back. /usr/local/sbin/wifi-watchdog.sh handles the recovery; this
# file is the upstream fix that prevents the lockup from happening
# in the first place.
#
# v1 carried this as the dedicated `wifi-powersave-off` systemd
# unit (see docs/02-LEARNINGS.md → "Power-save disabled is the
# single most important setting"). The B-1 cleanup pass H0.6
# removed that unit without a replacement; this file is the
# B-1 carryover.
#
# Value reference: NetworkManager's `wifi.powersave` is a tri-state
# enum — 0=default/keep current, 1=ignore (don't touch), 2=disable,
# 3=enable. We want 2 (disable). Documented at
# https://networkmanager.dev/docs/api/latest/settings-connection.html

[connection]
wifi.powersave = 2
