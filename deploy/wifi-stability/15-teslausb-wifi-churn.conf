# /etc/NetworkManager/conf.d/15-teslausb-wifi-churn.conf
#
# Installed by setup-lib/12-wifi-stability.sh.
#
# Reduces the rate of SDIO control-path traffic to the BCM43436 WiFi
# chip while it is connected and otherwise idle. Every host->chip
# control message is an iovar over the same SDIO bus that the firmware
# wedges on under load; trimming the periodic, low-value ones widens
# the margin before a lockup. This is the PREVENTION companion to the
# recovery ladder in /usr/local/sbin/wifi-watchdog.sh.
#
# Both settings are scoped to WiFi devices only (match-device=type:wifi)
# so the USB/Ethernet management paths are untouched.
#
# 1) ipv6.method = ignore
#    With IPv6 active, the kernel periodically reprograms the chip's
#    multicast filter for Router Solicitations, Neighbour Discovery and
#    MLD group membership — each one a `_brcmf_set_multicast_list`
#    iovar across the SDIO bus. This device is reached exclusively over
#    IPv4 (SSH + avahi `cybertruckusb.local` resolve via the A record),
#    so dropping IPv6 removes that churn with no loss of function.
#    `ignore` (rather than `disabled`) leaves the stack in place but
#    tells NM not to configure or maintain IPv6 on the link.
#
# 2) wifi.scan-rand-mac-address = no
#    NM randomizes the source MAC for each background scan by default,
#    which costs an extra set-MAC iovar on every scan cycle. Disabling
#    randomization removes that per-scan write. We deliberately do NOT
#    disable scanning itself: scans must keep working so the link can
#    re-associate after a watchdog recovery — preserving reconnect
#    reliability outranks shaving every last iovar.
#
# Connection-default + device-default sections per NetworkManager.conf:
# https://networkmanager.dev/docs/api/latest/NetworkManager.conf.html

[connection-teslausb-wifi-no-ipv6]
match-device=type:wifi
ipv6.method=ignore

[device-teslausb-wifi-no-scan-randmac]
match-device=type:wifi
wifi.scan-rand-mac-address=no
