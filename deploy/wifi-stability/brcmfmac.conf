# /etc/modprobe.d/brcmfmac.conf
#
# Installed by setup-lib/12-wifi-stability.sh.
#
# Hardens the brcmfmac driver against the BCM43436 SDIO firmware
# lockups documented in /usr/local/sbin/wifi-watchdog.sh.
#
# roamoff=1
#   Disables in-driver roaming. The driver's roaming logic on this
#   chip races with our own captive-portal / AP-fallback dispatcher
#   (setup-lib/05-network.sh installs the dispatcher) and is a
#   reproducible trigger for the `HT Avail request error` lockup.
#
# feature_disable=0x82000
#   Disables two firmware features that are unsafe on BCM43436:
#     bit 13 (0x002000) — BRCMF_FEAT_PNO    (preferred network offload)
#     bit 19 (0x080000) — BRCMF_FEAT_SCAN_V2 (offloaded scan engine)
#   PNO + offloaded scans run on the chip and have been observed to
#   silently wedge the firmware under load; disabling forces scans
#   onto the host CPU where they're observable and recoverable.
#
# Reference: kernel-source `drivers/net/wireless/broadcom/brcm80211/
# brcmfmac/feature.h` for the bit map, and brcm80211 ML archives for
# the BCM43436 lockup discussion.

options brcmfmac roamoff=1 feature_disable=0x82000
