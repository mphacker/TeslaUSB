# Sample configuration for `teslausb-worker`.
#
# Install path (matches units/teslausb-worker.service):
#   /etc/teslausb/worker.toml
#
# All paths must be absolute. Parent directories must exist and
# be readable+writable by the `teslausb` user that systemd runs
# the worker as.

backing_root = "/srv/teslausb/teslacam"
db_path = "/var/lib/teslausb/index.sqlite3"

[indexer]
# Decimate the per-frame SEI walk so a one-minute clip records
# at most ~60 waypoints, not 1800. Default keeps every 30th
# frame at 30 fps (~1 Hz of GPS). Must be > 0.
sei_sample_rate = 30
# Coalesce a burst of inotify events for the same clip into a
# single index attempt. Must be > 0.
debounce_ms = 1500

[cleanup]
# Keep no-GPS RecentClips clips for this many days, then sweep.
# SavedClips and SentryClips are never touched.
retention_days = 14

# Free-space floor as an integer percent. When the free percent
# drops below this value the cutoff widens to "now" so the
# sweep frees space oldest-first. Set to 0 to disable.
min_free_pct = 10

# When true, any RecentClips clip with at least one real GPS
# fix in its indexed waypoints is preserved past `retention_days`.
preserve_with_gps = true

# Cleanup sweep cadence in seconds. Floored at 5 s by the
# supervisor so a typo here cannot pin a CPU.
interval_seconds = 300
