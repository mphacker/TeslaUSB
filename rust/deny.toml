# cargo-deny configuration.
#
# Enforces the supply-chain side of SPEC.md §7 (engineering standards):
#   * Only permissive open-source licences (MIT/Apache/BSD/ISC/Unicode-3.0).
#   * No yanked crates.
#   * No advisory hits without an explicit, justified ignore.
#   * No git or alternative-registry sources (only crates.io).
#
# CI runs `cargo deny check`; pre-commit mirrors it locally.

[graph]
all-features = true

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Licences
# ---------------------------------------------------------------------------
[licenses]
version = 2
# Permissive licences compatible with shipping a binary on a Pi without
# triggering copyleft obligations. SPDX expressions, not free-text.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.93

# ---------------------------------------------------------------------------
# Security advisories
# ---------------------------------------------------------------------------
[advisories]
version = 2
yanked = "deny"
# When a CVE forces a temporary exception, add the RUSTSEC-XXXX-YYYY id here
# WITH a comment naming the tracking issue, the upstream PR we're waiting
# on, and the date by which it must be reviewed.
ignore = []

# ---------------------------------------------------------------------------
# Crate bans
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Explicit deny list grows as we identify problem crates (e.g. abandoned
# upstreams). Empty at Phase 0.2.
deny = []
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
