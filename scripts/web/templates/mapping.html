{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/leaflet/leaflet.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/leaflet/MarkerCluster.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/leaflet/MarkerCluster.Default.css') }}">
<style>
    .map-container { display: flex; flex-direction: column; height: calc(100vh - 120px); gap: 0; overflow: hidden; }
    #map { flex: 1; min-height: 0; border-radius: 8px; z-index: 1; }

    .map-toolbar {
        display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 0;
        align-items: center; font-size: 13px;
    }
    .map-toolbar button, .map-toolbar select {
        padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
        background: var(--bg-container); color: var(--text-primary);
        cursor: pointer; font-size: 13px;
    }
    .map-toolbar button:hover { background: var(--accent-color, #007bff); color: #fff; }
    .map-toolbar button.active { background: var(--accent-color, #007bff); color: #fff; }
    .map-toolbar .separator { border-left: 1px solid var(--border); height: 24px; }

    .stats-bar {
        display: flex; gap: 12px; padding: 5px 10px; font-size: 12px;
        background: var(--bg-secondary); color: var(--text-secondary);
        border-radius: 6px; flex-wrap: wrap; align-items: center;
        border: 1px solid var(--border);
    }
    .stats-bar .stat { display: flex; align-items: center; gap: 4px; }
    .stats-bar .stat-value { font-weight: 600; color: var(--text-primary); }

    .legend {
        position: absolute; bottom: 30px; right: 10px; z-index: 1000;
        background: var(--bg-container); color: var(--text-primary);
        padding: 10px 14px; border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 12px;
        max-width: 200px; border: 1px solid var(--border);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

    .indexer-status {
        padding: 8px 12px; border-radius: 6px; font-size: 13px;
        background: var(--bg-secondary); color: var(--text-primary);
        border: 1px solid var(--border);
    }
    .indexer-status.running { border-left: 3px solid #f0ad4e; }

    .popup-video-link { color: var(--accent-color, #007bff); cursor: pointer; text-decoration: underline; }

    /* Video player overlay */
    .video-overlay {
        position: fixed; z-index: 2000;
        background: var(--bg-secondary, #1a1a2e); border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow: hidden;
        width: 480px; max-width: 90vw;
        border: 1px solid var(--border, #333);
    }
    .video-overlay-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 8px 12px; background: var(--bg-primary, #111);
        font-size: 13px; color: var(--text-secondary, #aaa);
    }
    .video-overlay-header .close-btn {
        background: none; border: none; color: var(--text-secondary, #aaa);
        font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .video-overlay-header .close-btn:hover { color: #dc3545; }
    .video-overlay video {
        width: 100%; display: block; background: #000;
        max-height: 50vh;
    }
    .video-overlay-info {
        padding: 8px 12px; font-size: 12px; color: var(--text-secondary, #aaa);
        display: flex; gap: 12px; flex-wrap: wrap;
    }
    .cam-switcher {
        display: flex; gap: 2px; padding: 4px 6px;
        background: var(--bg-primary, #111); overflow-x: auto;
    }
    .cam-btn {
        padding: 4px 10px; border: 1px solid var(--border, #333); border-radius: 4px;
        background: var(--bg-secondary, #1a1a2e); color: var(--text-secondary, #aaa);
        font-size: 11px; cursor: pointer; white-space: nowrap;
    }
    .cam-btn:hover { background: var(--bg-hover, #333); color: var(--text-primary, #eee); }
    .cam-btn.active { background: var(--accent-color, #007bff); color: #fff; border-color: var(--accent-color, #007bff); }
    .nav-btn {
        padding: 3px 10px; border: 1px solid var(--border, #333); border-radius: 4px;
        background: var(--bg-secondary, #1a1a2e); color: var(--text-primary, #eee);
        font-size: 14px; cursor: pointer; line-height: 1;
    }
    .nav-btn:hover { background: var(--accent-color, #007bff); color: #fff; }

    /* FSD legend colors */
    .fsd-engaged { background: #28a745; }
    .fsd-manual { background: #6c757d; }

    @media (max-width: 768px) {
        .map-container { height: calc(100vh - 100px); }
        .map-toolbar { padding: 4px 0; gap: 4px; }
        .stats-bar { gap: 6px; font-size: 11px; padding: 4px 8px; }
        .legend { bottom: 20px; right: 5px; }
    }
</style>

<div class="container" style="max-width: 100%; padding: 0 12px;">
    <div class="map-container">
        <!-- Toolbar -->
        <div class="map-toolbar">
            <button id="btnTrips" class="active" onclick="showTrips()">🛣️ Trips</button>
            <select id="tripFilter" onchange="filterTrips()">
                <option value="">All Trips</option>
            </select>
            <button id="btnEvents" onclick="showEvents()">⚡ Events</button>
            <select id="eventFilter" onchange="filterEvents()" style="display:none">
                <option value="">All Events</option>
                <option value="harsh_brake">Harsh Braking</option>
                <option value="emergency_brake">Emergency Braking</option>
                <option value="hard_acceleration">Hard Acceleration</option>
                <option value="sharp_turn">Sharp Turn</option>
                <option value="speeding">Speeding</option>
                <option value="fsd_disengage">FSD Disengagement</option>
                <option value="fsd_engage">FSD Engagement</option>
            </select>
            <div class="separator"></div>
            <button id="btnFsd" onclick="toggleFsdOverlay()">🤖 FSD Overlay</button>
            <button id="btnHeat" onclick="toggleHeatmap()">🌡️ Heatmap</button>
            <div style="flex:1"></div>
            <button id="btnIndex" onclick="triggerIndex()">🔄 Index Videos</button>
        </div>

        <!-- Stats bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat">🛣️ <span class="stat-value" id="statTrips">—</span> trips</div>
            <div class="stat">📍 <span class="stat-value" id="statWaypoints">—</span> points</div>
            <div class="stat">⚡ <span class="stat-value" id="statEvents">—</span> events</div>
            <div class="stat">📏 <span class="stat-value" id="statDistance">—</span> mi</div>
            <div class="stat">📁 <span class="stat-value" id="statFiles">—</span> indexed</div>
        </div>

        <!-- Indexer status -->
        <div class="indexer-status" id="indexerStatus" style="display:none"></div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Legend -->
        <div class="legend" id="legend" style="display:none">
            <strong>Events</strong>
            <div class="legend-item"><span class="legend-dot" style="background:#dc3545"></span> Critical</div>
            <div class="legend-item"><span class="legend-dot" style="background:#ffc107"></span> Warning</div>
            <div class="legend-item"><span class="legend-dot" style="background:#17a2b8"></span> Info</div>
            <div style="margin-top:6px"><strong>FSD</strong></div>
            <div class="legend-item"><span class="legend-dot fsd-engaged"></span> Engaged</div>
            <div class="legend-item"><span class="legend-dot fsd-manual"></span> Manual</div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='vendor/leaflet/leaflet.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/leaflet/leaflet.markercluster.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/leaflet/leaflet-heat.js') }}"></script>
<script>
// Register Service Worker for offline tile caching (gap 1)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('{{ url_for("static", filename="tile-cache-sw.js") }}', { scope: '/' })
        .then(reg => console.log('Tile cache SW registered'))
        .catch(err => console.warn('Tile cache SW failed:', err));
}

// Fix Leaflet marker icon path for vendored setup
L.Icon.Default.imagePath = '{{ url_for("static", filename="vendor/leaflet/images/") }}';

// --- Map Initialization ---
const map = L.map('map').setView([37.7749, -122.4194], 10);

// OpenStreetMap tiles (loaded from OSM servers; cached by browser for offline)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

// Layer groups
const tripLayer = L.layerGroup().addTo(map);
const eventLayer = L.layerGroup();
const eventCluster = L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true });
const fsdLayer = L.layerGroup();
let heatLayer = null;

let currentView = 'trips';
let fsdVisible = false;
let heatVisible = false;
let allTrips = [];
let allEvents = [];

// Event severity colors
// Build a deep link to the event player for a video path
// video_path format: "RecentClips/2025-11-08_08-15-44-front.mp4"
//                 or "SavedClips/2025-11-08_08-15-44/2025-11-08_08-15-44-front.mp4"
function buildVideoLink(videoPath, timestamp) {
    const parts = videoPath.replace(/\\/g, '/').split('/');
    if (parts.length >= 3) {
        // Event structure: folder/event_name/filename → /videos/event/folder/event_name
        return `/videos/event/${parts[0]}/${parts[1]}`;
    } else if (parts.length === 2) {
        // Flat structure: folder/filename → /videos/session/folder/session_id
        const filename = parts[1];
        // Extract session timestamp: 2025-11-08_08-15-44 from 2025-11-08_08-15-44-front.mp4
        const match = filename.match(/^(\d{4}-\d{2}-\d{2}_\d{2}-\d{2}-\d{2})/);
        if (match) return `/videos/session/${parts[0]}/${match[1]}`;
    }
    // Fallback: stream the raw file
    return `/videos/stream/${videoPath}`;
}

const severityColors = {
    critical: '#dc3545',
    warning: '#ffc107',
    info: '#17a2b8',
};

const eventIcons = {
    harsh_brake: '🔴', emergency_brake: '🔴', hard_acceleration: '🟢',
    sharp_turn: '🟡', speeding: '🟡', fsd_disengage: '🟠', fsd_engage: '🔵',
    sentry: '🟣', saved: '🔵',
};

// --- Data Loading ---

async function loadStats() {
    try {
        const resp = await fetch('/map/api/stats');
        const data = await resp.json();
        document.getElementById('statTrips').textContent = data.trip_count || 0;
        document.getElementById('statWaypoints').textContent = (data.waypoint_count || 0).toLocaleString();
        document.getElementById('statEvents').textContent = data.event_count || 0;
        document.getElementById('statDistance').textContent = ((data.total_distance_km || 0) * 0.621371).toFixed(1);
        document.getElementById('statFiles').textContent = data.indexed_file_count || 0;
    } catch(e) { console.error('Failed to load stats:', e); }
}

async function loadTrips() {
    try {
        const resp = await fetch('/map/api/trips?limit=200');
        const data = await resp.json();
        allTrips = data.trips || [];

        // Populate trip dropdown
        const sel = document.getElementById('tripFilter');
        sel.innerHTML = '<option value="">All Trips</option>';
        allTrips.forEach(t => {
            const date = (t.start_time || '').replace('T', ' ').substring(0, 16);
            const dist = ((t.distance_km || 0) * 0.621371).toFixed(1);
            sel.innerHTML += `<option value="${t.id}">${date} — ${dist} mi</option>`;
        });

        await renderTrips();
    } catch(e) { console.error('Failed to load trips:', e); }
}

function filterTrips() {
    const selected = document.getElementById('tripFilter').value;
    if (selected) {
        const trip = allTrips.find(t => t.id == selected);
        if (trip) {
            const saved = allTrips;
            allTrips = [trip];
            renderTrips().then(() => { allTrips = saved; });
        }
    } else {
        renderTrips();
    }
}

async function loadTripRoute(tripId) {
    try {
        const resp = await fetch(`/map/api/trip/${tripId}/route`);
        return await resp.json();
    } catch(e) {
        console.error('Failed to load route:', e);
        return null;
    }
}

async function loadEvents() {
    const filter = document.getElementById('eventFilter').value;
    const params = new URLSearchParams({ limit: 500 });
    if (filter) params.set('type', filter);

    try {
        const resp = await fetch(`/map/api/events?${params}`);
        const data = await resp.json();
        allEvents = data.events || [];
        renderEvents();
    } catch(e) { console.error('Failed to load events:', e); }
}

// --- Rendering ---

async function renderTrips() {
    tripLayer.clearLayers();
    fsdLayer.clearLayers();
    const bounds = [];

    for (const trip of allTrips) {
        if (!trip.start_lat || !trip.start_lon) continue;
        bounds.push([trip.start_lat, trip.start_lon]);
        if (trip.end_lat && trip.end_lon) bounds.push([trip.end_lat, trip.end_lon]);

        const geojson = await loadTripRoute(trip.id);
        if (!geojson || !geojson.geometry) continue;

        const coords = geojson.geometry.coordinates;
        const waypoints = geojson.properties.waypoints || [];
        const latLngs = coords.map(c => [c[1], c[0]]);

        // Route polyline
        const routeLine = L.polyline(latLngs, {
            color: '#007bff', weight: 4, opacity: 0.8,
        }).addTo(tripLayer);

        // FSD overlay segments
        let segStart = 0;
        for (let i = 1; i < waypoints.length; i++) {
            const prevAp = waypoints[i-1].autopilot_state;
            const curAp = waypoints[i].autopilot_state;
            if (prevAp !== curAp || i === waypoints.length - 1) {
                const segCoords = latLngs.slice(segStart, i + 1);
                const engaged = ['SELF_DRIVING', 'AUTOSTEER'].includes(prevAp);
                L.polyline(segCoords, {
                    color: engaged ? '#28a745' : '#6c757d',
                    weight: 6, opacity: 0.7,
                }).addTo(fsdLayer);
                segStart = i;
            }
        }

        // Start/end markers
        if (latLngs.length > 0) {
            const dist = ((trip.distance_km || 0) * 0.621371).toFixed(1);
            const dur = Math.round((trip.duration_seconds || 0) / 60);
            L.circleMarker(latLngs[0], {
                radius: 8, fillColor: '#28a745', color: '#fff', weight: 2, fillOpacity: 0.9,
            }).bindPopup(
                `<strong>🟢 Trip #${trip.id}</strong><br>` +
                `📅 ${trip.start_time || 'Unknown'}<br>` +
                `📏 ${dist} mi · ⏱ ${dur} min`
            ).addTo(tripLayer);

            L.circleMarker(latLngs[latLngs.length - 1], {
                radius: 8, fillColor: '#dc3545', color: '#fff', weight: 2, fillOpacity: 0.9,
            }).bindPopup('🔴 Trip End').addTo(tripLayer);
        }

        // Click route to open video player overlay
        const routeWaypoints = waypoints; // capture for closure
        routeLine.on('click', function(e) {
            let minDist = Infinity, nearest = null;
            routeWaypoints.forEach(wp => {
                const d = map.distance(e.latlng, [wp.lat, wp.lon]);
                if (d < minDist) { minDist = d; nearest = wp; }
            });
            if (nearest && nearest.video_path) {
                openVideoOverlay(nearest, e.containerPoint, routeWaypoints);
            }
        });
    }

    if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [30, 30] });
    }
}

// --- Video Player Overlay ---

const CAMERA_ANGLES = ['front', 'back', 'left_repeater', 'right_repeater', 'left_pillar', 'right_pillar'];
const CAMERA_LABELS = {
    'front': '🎥 Front', 'back': '🔙 Back',
    'left_repeater': '◀️ Left', 'right_repeater': '▶️ Right',
    'left_pillar': '↙️ L Pillar', 'right_pillar': '↘️ R Pillar'
};

let overlayWaypoints = [];
let overlayClips = [];
let overlayClipIdx = 0;
let overlayCurrentAngle = 'front';
let overlayBasePath = '';

function getBasePath(videoPath) {
    // "RecentClips/2026-04-02_18-00-10-front.mp4" → "RecentClips/2026-04-02_18-00-10"
    const angle = CAMERA_ANGLES.find(a => videoPath.includes('-' + a + '.'));
    return angle ? videoPath.replace(`-${angle}.mp4`, '') : videoPath.replace('.mp4', '');
}

function openVideoOverlay(waypoint, clickPoint, routeWps) {
    closeVideoOverlay();

    // Set waypoints AFTER close clears them
    overlayWaypoints = routeWps || [];

    const filename = waypoint.video_path.split('/').pop();
    overlayCurrentAngle = CAMERA_ANGLES.find(a => filename.includes('-' + a + '.')) || 'front';
    overlayBasePath = getBasePath(waypoint.video_path);

    // Build clip list from overlayWaypoints (set by route click handler)
    overlayClips = [];
    const seen = new Set();
    overlayWaypoints.forEach(wp => {
        if (!wp.video_path) return;
        const bp = getBasePath(wp.video_path);
        if (!seen.has(bp)) {
            seen.add(bp);
            overlayClips.push({ basePath: bp, firstWaypoint: wp });
        }
    });
    overlayClipIdx = Math.max(0, overlayClips.findIndex(c => c.basePath === overlayBasePath));

    // Position overlay
    const mapEl = document.getElementById('map');
    const mapRect = mapEl.getBoundingClientRect();
    let left = mapRect.left + clickPoint.x + 15;
    let top = mapRect.top + clickPoint.y - 100;
    if (left + 490 > window.innerWidth) left = window.innerWidth - 500;
    if (top + 350 > window.innerHeight) top = window.innerHeight - 360;
    if (left < 10) left = 10;
    if (top < 10) top = 10;

    const overlay = document.createElement('div');
    overlay.className = 'video-overlay';
    overlay.id = 'videoOverlay';
    overlay.style.left = left + 'px';
    overlay.style.top = top + 'px';

    const cameraBtns = CAMERA_ANGLES.map(a => {
        const active = a === overlayCurrentAngle ? ' active' : '';
        return `<button class="cam-btn${active}" data-angle="${a}" onclick="switchCamera('${a}')">${CAMERA_LABELS[a]}</button>`;
    }).join('');

    overlay.innerHTML = `
        <div class="video-overlay-header">
            <span id="overlayTitle">🎥 ${filename}</span>
            <button class="close-btn" onclick="closeVideoOverlay()">✕</button>
        </div>
        <div class="cam-switcher" id="camSwitcher">${cameraBtns}</div>
        <video id="overlayVideo" controls autoplay muted></video>
        <div class="video-overlay-info" id="overlayInfo">
            <span id="olSpeed">🏎️ — mph</span>
            <span id="olAP">🤖 —</span>
            <span id="olCoords">📍 —</span>
            <div style="margin-left:auto; display:flex; gap:4px;">
                <button class="nav-btn" onclick="navigateClip(-1)" title="Previous clip">⏮</button>
                <button class="nav-btn" onclick="navigateClip(1)" title="Next clip">⏭</button>
            </div>
        </div>
    `;

    document.body.appendChild(overlay);

    // Load the video
    const video = document.getElementById('overlayVideo');
    video.src = `/videos/stream/${waypoint.video_path}`;

    // Seek on load
    video.addEventListener('loadedmetadata', function onLoad() {
        const estimatedTime = Math.max(0, (waypoint.frame_offset || 0) / 36 - 2);
        if (estimatedTime > 0 && estimatedTime < video.duration) {
            video.currentTime = estimatedTime;
        }
        video.removeEventListener('loadedmetadata', onLoad);
    });

    // Live telemetry on timeupdate
    video.addEventListener('timeupdate', onOverlayTimeUpdate);

    // Initial telemetry
    updateOverlayTelemetry(waypoint);

    // Draggable
    let isDragging = false, dragX, dragY;
    const header = overlay.querySelector('.video-overlay-header');
    header.style.cursor = 'grab';
    header.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('close-btn')) return;
        isDragging = true;
        dragX = e.clientX - overlay.offsetLeft;
        dragY = e.clientY - overlay.offsetTop;
        header.style.cursor = 'grabbing';
    });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        overlay.style.left = (e.clientX - dragX) + 'px';
        overlay.style.top = (e.clientY - dragY) + 'px';
    });
    document.addEventListener('mouseup', () => {
        isDragging = false;
        if (header) header.style.cursor = 'grab';
    });
}

function onOverlayTimeUpdate() {
    const video = document.getElementById('overlayVideo');
    if (!video || !overlayWaypoints.length) return;

    const currentTimeSec = video.currentTime;
    const currentFrame = Math.round(currentTimeSec * 36);

    // Find the nearest waypoint matching the CURRENT clip's base path
    let nearest = null, minDelta = Infinity;
    for (const wp of overlayWaypoints) {
        if (!wp.video_path) continue;
        if (getBasePath(wp.video_path) !== overlayBasePath) continue;
        const delta = Math.abs((wp.frame_offset || 0) - currentFrame);
        if (delta < minDelta) { minDelta = delta; nearest = wp; }
    }

    if (nearest) updateOverlayTelemetry(nearest);
}

function updateOverlayTelemetry(wp) {
    const speed = document.getElementById('olSpeed');
    const apEl = document.getElementById('olAP');
    const coords = document.getElementById('olCoords');
    if (speed) speed.textContent = `🏎️ ${Math.round(Math.abs((wp.speed_mps || 0) * 2.237))} mph`;
    if (apEl) {
        const ap = wp.autopilot_state || 'NONE';
        const engaged = ['SELF_DRIVING', 'AUTOSTEER'].includes(ap);
        apEl.textContent = `🤖 ${ap}`;
        apEl.style.color = engaged ? '#28a745' : '';
    }
    if (coords) coords.textContent = `📍 ${(wp.lat || 0).toFixed(4)}, ${(wp.lon || 0).toFixed(4)}`;
}

function switchCamera(angle) {
    const video = document.getElementById('overlayVideo');
    if (!video) return;

    const currentTime = video.currentTime;
    const wasPaused = video.paused;
    overlayCurrentAngle = angle;

    const newPath = `${overlayBasePath}-${angle}.mp4`;
    const newFilename = newPath.split('/').pop();

    document.querySelectorAll('#camSwitcher .cam-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.angle === angle);
    });

    const title = document.getElementById('overlayTitle');
    if (title) title.textContent = `🎥 ${newFilename}`;

    video.src = `/videos/stream/${newPath}`;
    video.addEventListener('loadedmetadata', function onLoad() {
        video.currentTime = currentTime;
        if (!wasPaused) video.play().catch(() => {});
        video.removeEventListener('loadedmetadata', onLoad);
    }, { once: true });
}

function navigateClip(direction) {
    const newIdx = overlayClipIdx + direction;
    if (newIdx < 0 || newIdx >= overlayClips.length) return;

    overlayClipIdx = newIdx;
    const clip = overlayClips[newIdx];
    overlayBasePath = clip.basePath;

    const newPath = `${clip.basePath}-${overlayCurrentAngle}.mp4`;
    const newFilename = newPath.split('/').pop();

    const title = document.getElementById('overlayTitle');
    if (title) title.textContent = `🎥 ${newFilename}`;

    const video = document.getElementById('overlayVideo');
    if (!video) return;

    video.src = `/videos/stream/${newPath}`;
    video.addEventListener('loadedmetadata', function onLoad() {
        video.play().catch(() => {});
        video.removeEventListener('loadedmetadata', onLoad);
    }, { once: true });

    updateOverlayTelemetry(clip.firstWaypoint);
}

function closeVideoOverlay() {
    const existing = document.getElementById('videoOverlay');
    if (existing) {
        const video = existing.querySelector('video');
        if (video) {
            video.removeEventListener('timeupdate', onOverlayTimeUpdate);
            video.pause(); video.src = '';
        }
        existing.remove();
    }
    overlayWaypoints = [];
    overlayClips = [];
}

function renderEvents() {
    eventCluster.clearLayers();

    allEvents.forEach(ev => {
        if (!ev.lat || !ev.lon) return;
        const color = severityColors[ev.severity] || '#17a2b8';
        const icon = eventIcons[ev.event_type] || '📍';

        const marker = L.circleMarker([ev.lat, ev.lon], {
            radius: 8, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.9,
        });

        marker.bindPopup(
            `<strong>${icon} ${ev.event_type.replace(/_/g, ' ')}</strong><br>` +
            `📅 ${ev.timestamp}<br>` +
            `${ev.description || ''}<br>` +
            (ev.video_path ?
                `🎥 <a href="${buildVideoLink(ev.video_path, ev.timestamp)}" target="_blank">View Video</a>` : '')
        );

        eventCluster.addLayer(marker);
    });
}

// --- View Switching ---

function showTrips() {
    currentView = 'trips';
    document.getElementById('btnTrips').classList.add('active');
    document.getElementById('btnEvents').classList.remove('active');
    document.getElementById('tripFilter').style.display = '';
    document.getElementById('eventFilter').style.display = 'none';
    document.getElementById('legend').style.display = 'none';
    map.removeLayer(eventCluster);
    tripLayer.addTo(map);
    loadTrips();
}

function showEvents() {
    currentView = 'events';
    document.getElementById('btnEvents').classList.add('active');
    document.getElementById('btnTrips').classList.remove('active');
    document.getElementById('eventFilter').style.display = '';
    document.getElementById('tripFilter').style.display = 'none';
    document.getElementById('legend').style.display = 'block';
    map.removeLayer(tripLayer);
    eventCluster.addTo(map);
    loadEvents();
}

function filterEvents() {
    if (currentView === 'events') loadEvents();
}

function toggleFsdOverlay() {
    fsdVisible = !fsdVisible;
    document.getElementById('btnFsd').classList.toggle('active', fsdVisible);
    if (fsdVisible) {
        fsdLayer.addTo(map);
    } else {
        map.removeLayer(fsdLayer);
    }
}

async function toggleHeatmap() {
    heatVisible = !heatVisible;
    document.getElementById('btnHeat').classList.toggle('active', heatVisible);

    if (!heatVisible) {
        if (heatLayer) map.removeLayer(heatLayer);
        return;
    }

    // Build heatmap from all trip waypoints
    if (!heatLayer) {
        try {
            const resp = await fetch('/map/api/trips?limit=500');
            const data = await resp.json();
            const heatPoints = [];

            for (const trip of (data.trips || [])) {
                if (!trip.start_lat || !trip.start_lon) continue;
                heatPoints.push([trip.start_lat, trip.start_lon, 0.5]);
                if (trip.end_lat && trip.end_lon) {
                    heatPoints.push([trip.end_lat, trip.end_lon, 0.5]);
                }
            }

            // Also add event locations with higher intensity
            const evResp = await fetch('/map/api/events?limit=1000');
            const evData = await evResp.json();
            for (const ev of (evData.events || [])) {
                if (!ev.lat || !ev.lon) continue;
                const intensity = ev.severity === 'critical' ? 1.0 : ev.severity === 'warning' ? 0.7 : 0.4;
                heatPoints.push([ev.lat, ev.lon, intensity]);
            }

            if (heatPoints.length > 0) {
                heatLayer = L.heatLayer(heatPoints, {
                    radius: 20, blur: 15, maxZoom: 15,
                    gradient: { 0.2: '#17a2b8', 0.4: '#28a745', 0.6: '#ffc107', 0.8: '#fd7e14', 1.0: '#dc3545' }
                });
            }
        } catch(e) {
            console.error('Failed to build heatmap:', e);
            return;
        }
    }

    if (heatLayer) heatLayer.addTo(map);
}

// --- Indexer ---

async function triggerIndex() {
    const btn = document.getElementById('btnIndex');
    btn.disabled = true;
    btn.textContent = '⏳ Starting...';

    try {
        const resp = await fetch('/map/api/index/trigger', { method: 'POST' });
        const data = await resp.json();
        if (data.success) {
            pollIndexer();
        } else {
            alert(data.message || 'Failed to start indexer');
            btn.disabled = false;
            btn.textContent = '🔄 Index Videos';
        }
    } catch(e) {
        alert('Failed to start indexer: ' + e.message);
        btn.disabled = false;
        btn.textContent = '🔄 Index Videos';
    }
}

async function pollIndexer() {
    const statusDiv = document.getElementById('indexerStatus');
    const btn = document.getElementById('btnIndex');

    try {
        const resp = await fetch('/map/api/index/status');
        const data = await resp.json();

        if (data.running) {
            statusDiv.style.display = 'block';
            statusDiv.className = 'indexer-status running';
            statusDiv.textContent = `⏳ ${data.progress || 'Indexing...'} (${data.files_done || 0}/${data.files_total || '?'})`;
            btn.disabled = true;
            btn.textContent = '⏳ Indexing...';
            setTimeout(pollIndexer, 2000);
        } else {
            statusDiv.style.display = data.error ? 'block' : 'none';
            if (data.error) {
                statusDiv.className = 'indexer-status';
                statusDiv.textContent = `❌ ${data.error}`;
            } else if (data.progress) {
                statusDiv.style.display = 'block';
                statusDiv.className = 'indexer-status';
                statusDiv.textContent = `✅ ${data.progress}`;
                setTimeout(() => { statusDiv.style.display = 'none'; }, 10000);
            }
            btn.disabled = false;
            btn.textContent = '🔄 Index Videos';
            // Reload data
            loadStats();
            if (currentView === 'trips') loadTrips();
            else loadEvents();
        }
    } catch(e) {
        btn.disabled = false;
        btn.textContent = '🔄 Index Videos';
    }
}

// --- Init ---
loadStats();
loadTrips();

// Check if indexer is already running on page load
fetch('/map/api/index/status')
    .then(r => r.json())
    .then(data => { if (data.running) pollIndexer(); });
</script>
