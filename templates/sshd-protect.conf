# Prevent TeslaUSB services from stopping or masking sshd.
# This drop-in ensures SSH is always available for recovery,
# even if TeslaUSB services fail or enter a bad state.
#
# Deployed by setup_usb.sh to: /etc/systemd/system/ssh.service.d/teslausb-protect.conf
# (Also deployed for sshd.service for systems that use that name)

[Unit]
# Prevent this service from being stopped by dependency chains
RefuseManualStop=no
IgnoreOnIsolate=yes
